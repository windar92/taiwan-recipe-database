const app=document.getElementById('app'),catnav=document.getElementById('catnav'),stat=document.getElementById('stat'),nores=document.getElementById('nores');
let curFilter='all', TOTAL=1179, DONE=1151;
(function(){var b=document.getElementById('submitBtn');if(b){var h=b.getAttribute('href');if(h&&h.indexOf('FORMURL')<0&&h.length>5){b.style.display='inline-block';}}})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slug(i){return 'c'+i;}

DATA.forEach((c,i)=>{
  const a=document.createElement('a');a.href='#'+slug(i);a.textContent=c.c.replace(/^[一二三四五六七八九十]+、/,'');catnav.appendChild(a);
  const sec=document.createElement('section');sec.className='cat';sec.id=slug(i);
  let html='<h2>'+esc(c.c)+'</h2>';
  c.subs.forEach(sub=>{
    if(sub.s) html+='<div class="subhead">'+esc(sub.s)+'</div>';
    html+='<div class="grid">';
    sub.d.forEach(d=>{
      const has=d.v&&d.v.length;
      const chefs=has?d.v.map(v=>v.c).join(' '):'';
      if(has){
        html+='<details class="vidbox" data-name="'+esc(d.n)+'" data-cat="'+esc(c.c)+'" data-chefs="'+esc(chefs)+'" data-status="done">'
          +'<summary class="dish has"><span class="nm">'+esc(d.n)+'</span><span class="cnt">'+d.v.length+'部</span></summary>'
          +'<ul class="vids">'+d.v.map(v=>'<li><a href="'+esc(v.u)+'" target="_blank" rel="noopener">'+esc(v.t)+'</a>'+(v.c?' <span class="ch">— '+esc(v.c)+'</span>':'')+'</li>').join('')+'</ul></details>';
      }else{
        html+='<div class="dish todo" data-name="'+esc(d.n)+'" data-cat="'+esc(c.c)+'" data-chefs="" data-status="todo"><span class="nm">'+esc(d.n)+'</span></div>';
      }
    });
    html+='</div>';
  });
  sec.innerHTML=html;app.appendChild(sec);
});

function apply(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let shown=0;
  document.querySelectorAll('section.cat').forEach(sec=>{
    let vis=0;
    sec.querySelectorAll('[data-name]').forEach(d=>{
      const hay=(d.dataset.name+' '+d.dataset.cat+' '+d.dataset.chefs).toLowerCase();
      const ok=(!q||hay.includes(q))&&(curFilter==='all'||d.dataset.status===curFilter);
      d.style.display=ok?'':'none';if(ok){vis++;shown++;}
    });
    sec.querySelectorAll('.subhead').forEach(h=>{
      let n=h.nextElementSibling, any=false;
      if(n&&n.classList.contains('grid')){n.querySelectorAll('[data-name]').forEach(d=>{if(d.style.display!=='none')any=true;});}
      h.style.display=any?'':'none';
    });
    sec.style.display=vis?'':'none';
  });
  nores.style.display=shown?'none':'block';
  stat.textContent='共 '+TOTAL+' 道 · '+DONE+' 有影片'+((q||curFilter!=='all')?'（顯示 '+shown+'）':'');
}
document.getElementById('search').addEventListener('input',apply);
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;apply();
}));
apply();
function track(n,d){try{window.va&&window.va('event',Object.assign({name:n},d||{}));}catch(e){}}
(function(){var sb=document.getElementById('submitBtn');if(sb)sb.addEventListener('click',function(){track('submit_click');});
var ap=document.getElementById('app');if(ap)ap.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('.vids a');if(a){var d=a.closest('[data-name]');track('video_click',{dish:d?d.dataset.name:''});return;}var s=e.target.closest&&e.target.closest('summary.dish');if(s){var dd=s.closest('[data-name]');track('dish_open',{dish:dd?dd.dataset.name:''});}});
var st,se=document.getElementById('search');if(se)se.addEventListener('input',function(){clearTimeout(st);var q=this.value.trim();st=setTimeout(function(){if(q.length>=2)track('search',{q:q});},1200);});})();
</script>
